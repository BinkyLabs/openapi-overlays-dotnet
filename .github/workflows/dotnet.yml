name: Build, test and publish dotnet
on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  dotnet-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      code-quality: write
      pull-requests: read

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.x
      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.x
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x
      - name: Restore dependencies
        run: dotnet restore
      - name: Check formatting
        run: dotnet format --verify-no-changes
      - name: Build
        run: dotnet build --no-restore --configuration Release
      - name: Test
        run: dotnet test --no-build --verbosity normal --configuration Release --coverlet --coverlet-output-format cobertura
      - name: Install report generator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool
      - name: Pack the project
        run: dotnet pack --configuration Release
      - name: Generate coverage report
        run: reportgenerator -reporttypes:"MarkdownSummaryGithub;Cobertura" -reports:**/coverage.cobertura.*.xml -targetdir:./reports/coverage
      - name: Upload coverage report
        if: (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]') || (github.event_name != 'pull_request' && github.ref_name == github.event.repository.default_branch)
        uses: actions/upload-code-coverage@v1
        with:
          file: ./reports/coverage/Cobertura.xml
          language: CSharp
          label: code-coverage/dotnet
      - uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: reports/coverage
      - uses: actions/upload-artifact@v7
        with:
          name: packages
          path: src/*/bin/Release/*.*nupkg
      - name: Publish coverage report to GitHub Step Summary
        run: |
          cat reports/coverage/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

  validate-performance:
    name: Validate performance of the library
    runs-on: ubuntu-latest
    needs: [dotnet-build]
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.x
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x
      - name: Copy committed results
        run: |
          mkdir -p ./performanceResults
          cp ./performance/benchmark/BenchmarkDotNet.Artifacts/results/*-report.json ./performanceResults
      - name: Run performance tests
        run: dotnet run -c Release
        working-directory: ./performance/benchmark
      - name: Publish benchmark results
        uses: actions/upload-artifact@v7
        with:
          if-no-files-found: error
          name: benchmark-results
          path: ${{ github.workspace }}/performance/benchmark/BenchmarkDotNet.Artifacts/results
      - name: Compare overlay loading benchmark results
        run: dotnet run -c Release --project ./performance/resultsComparer/ResultsComparer.csproj -- compare $OLD_REPORT $NEW_REPORT -p OnePercentDifferenceMemoryUsage
        shell: bash
        env:
          NEW_REPORT: ${{ github.workspace }}/performance/benchmark/BenchmarkDotNet.Artifacts/results/performance.OverlayLoading-report.json
          OLD_REPORT: ${{ github.workspace }}/performanceResults/performance.OverlayLoading-report.json
      - name: Compare overlay application benchmark results
        run: dotnet run -c Release --project ./performance/resultsComparer/ResultsComparer.csproj -- compare $OLD_REPORT $NEW_REPORT -p OnePercentDifferenceMemoryUsage
        shell: bash
        env:
          NEW_REPORT: ${{ github.workspace }}/performance/benchmark/BenchmarkDotNet.Artifacts/results/performance.OverlayApplication-report.json
          OLD_REPORT: ${{ github.workspace }}/performanceResults/performance.OverlayApplication-report.json
   
  publish-release-to-nuget:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: dotnet-build
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.x
      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.x
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x
      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          name: packages
      - name: NuGet login
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}
      - name: Publish to NuGet
        run: dotnet nuget push **/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
      - name: Publish to GitHub Packages
        run: gh release upload ${{ github.ref_name }} lib/bin/Release/*.nupkg lib/bin/Release/*.snupkg tool/bin/Release/*.nupkg tool/bin/Release/*.snupkg --repo ${{ github.repository }} --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - uses: actions/checkout@v7
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-{{branch}}
            type=raw,value=v2,enable=${{ startsWith(github.ref, 'refs/tags/v2') }}
            type=raw,value=v3,enable=${{ startsWith(github.ref, 'refs/tags/v3') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v3') }}

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push Docker image
        id: push
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

      - name: Generate artifact attestation
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') 
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true